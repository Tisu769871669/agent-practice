id: "001"
slug: "echo-agent"
title: "Echo Agent"
track: "foundations"
difficulty: "easy"
status: "runnable"
version: "0.1.0"
summary: "Return provided facts exactly without adding new facts."
tags:
  - instruction-following
  - structured-output
frameworks:
  official:
    - raw-python
    - langchain
    - langgraph
  interface: "framework-neutral"
entrypoint:
  module: "solution.agent"
  callable: "run"
  signature: "run(input: dict, context: AgentContext) -> dict"
schemas:
  input: "schemas/input.schema.json"
  output: "schemas/output.schema.json"
fixtures:
  public: "fixtures/public.jsonl"
limits:
  timeout_seconds: 60
  max_tool_calls: 0
  max_output_chars: 2000
scoring:
  max_score: 100
  pass_score: 70
  metrics:
    - name: "schema_validity"
      weight: 20
    - name: "fact_preservation"
      weight: 60
    - name: "no_added_facts"
      weight: 20
