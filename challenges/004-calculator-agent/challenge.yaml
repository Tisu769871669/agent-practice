id: "004"
slug: "calculator-agent"
title: "Calculator Agent"
track: "tools"
difficulty: "easy"
status: "runnable"
version: "0.1.0"
summary: "Use a deterministic calculator tool instead of guessing."
tags:
  - tools
  - deterministic
frameworks:
  official:
    - raw-python
    - langchain
    - langgraph
  interface: "framework-neutral"
entrypoint:
  module: "solution.agent"
  callable: "run"
  signature: "run(input: dict, context: AgentContext) -> dict"
schemas:
  input: "schemas/input.schema.json"
  output: "schemas/output.schema.json"
fixtures:
  public: "fixtures/public.jsonl"
limits:
  timeout_seconds: 60
  max_tool_calls: 0
  max_output_chars: 2000
scoring:
  max_score: 100
  pass_score: 90
  metrics:
    - name: "schema_validity"
      weight: 20
    - name: "expression_match"
      weight: 20
    - name: "numeric_result"
      weight: 60
