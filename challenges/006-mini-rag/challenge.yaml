id: "006"
slug: "mini-rag"
title: "Mini RAG"
track: "rag"
difficulty: "medium"
status: "runnable"
version: "0.1.0"
summary: "Answer from a small document set with citations."
tags:
  - rag
  - citations
frameworks:
