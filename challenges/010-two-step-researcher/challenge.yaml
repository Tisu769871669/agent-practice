id: "010"
slug: "two-step-researcher"
title: "Two-Step Researcher"
track: "workflow"
difficulty: "medium"
status: "runnable"
version: "0.1.0"
summary: "Retrieve evidence first, then answer from that evidence."
tags:
  - workflow
  - research
frameworks:
  official:
    - raw-python
    - langchain
    - langgraph
  interface: "framework-neutral"
entrypoint:
  module: "solution.agent"
  callable: "run"
  signature: "run(input: dict, context: AgentContext) -> dict"
schemas:
  input: "schemas/input.schema.json"
  output: "schemas/output.schema.json"
fixtures:
  public: "fixtures/public.jsonl"
limits:
  timeout_seconds: 60
  max_tool_calls: 0
  max_output_chars: 4000
scoring:
  max_score: 100
  pass_score: 90
  metrics:
    - name: "schema_validity"
      weight: 20
    - name: "workflow_order"
      weight: 30
    - name: "answer_keywords"
      weight: 30
    - name: "citation_ids"
      weight: 20
